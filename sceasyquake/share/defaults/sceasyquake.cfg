# sceasyquake default configuration
# This file is installed to $SEISCOMP_ROOT/etc/defaults/sceasyquake.cfg
# User overrides belong in $SEISCOMP_ROOT/etc/sceasyquake.cfg (managed by scconfig)

# ---------------------------------------------------------------------------
# SeedLink waveform server
# ---------------------------------------------------------------------------
seedlink.host = localhost
seedlink.port = 18000

# ---------------------------------------------------------------------------
# Stream selection
# Comma-separated list of NET.STA.LOC.CHA selectors (wildcards OK).
# Leave empty to subscribe to all vertical channels.
# ---------------------------------------------------------------------------
# streams.codes = CI.*.*.HHZ,CI.*.*.EHZ

# ---------------------------------------------------------------------------
# ML picker
#
# Two backends are available:
#
#   seisbench  – SeisBench (PyTorch).  Supports all three architectures.
#                Custom weights can be loaded via picker.model_path.
#
#   easyquake  – easyQuake TF/Keras wrappers.  Supports phasenet and gpd
#                only.  Always uses built-in pretrained weights; model_path
#                has no effect.
#
# Set picker.backend first, then picker.model.
# ---------------------------------------------------------------------------
picker.backend    = seisbench    # seisbench | easyquake | stub
picker.model      = phasenet     # phasenet | eqtransformer | gpd
                                 #   (eqtransformer only available with seisbench backend)

# seisbench backend: base architecture / pretrained weight set name.
# Two roles depending on model_path:
#   No model_path      : names the hub weight set used directly for inference.
#   Raw .pt model_path : names the architecture template (norm, labels, SR)
#                        used to construct the model before custom weights are
#                        loaded.  The hub weights themselves are not used.
#   SeisBench dir      : ignored entirely (all metadata comes from the .json).
picker.pretrained = stead        # phasenet: stead, diting, ethz, scedc, geofon
                                 # gpd: original, scedc, geofon
                                 # eqtransformer: original, ethz, scedc, stead

# seisbench backend: path to custom model weights directory (or .pt file)
# Leave empty to use picker.pretrained weights.
# picker.model_path =

picker.threshold  = 0.5          # probability threshold (P and S)
picker.gpd_threshold = 0.994     # GPD-specific threshold (overrides picker.threshold for gpd model)
picker.device     = cpu          # cpu | cuda
picker.buffer_seconds = 60
picker.step_seconds   = 5
